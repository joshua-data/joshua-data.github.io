# --- About Me cards (rendered in a 2x2 grid) ---
# Each card: { title, items[], note? }
about_cards:
  - title: My Working Rhythm
    items:
      - Learn fast.
      - Apply what I learn quickly.
      - Write it down so the next person doesn't have to figure it out alone.

  - title: Roles I've Held
    items:
      - Data Analyst
      - Analytics Engineer
      - Data Engineer
    note: "Different titles, same goal: helping people make better decisions with data."

  - title: How I Show Up
    items:
      - Calm, especially when things get noisy.
      - Self-directed, with a steady bias for getting things done.
      - I do my best work when I'm trusted with autonomy, and I bring teammates in early when I'm unsure.

  - title: What I Care About
    items:
      - I treat data like a product. It has real users and a long shelf life.
      - The best part of my day is when something I built quietly makes a teammate's job easier.
      - I don't like settling in. There's always something I haven't learned yet.

