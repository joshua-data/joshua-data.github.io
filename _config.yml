# =============================================================================
# Jekyll Configuration — build/runtime settings only.
#
# All site content (identity, nav, social, copy) lives in _data/:
#   _data/profile.yml   — name, role, social links, email, GA ID
#   _data/ui.yml        — nav menu, section titles, footer labels
#   _data/home.yml      — About cards + Testimonials
#   _data/taxonomy.yml  — blog category slugs ↔ display names
#
# The handful of keys below (name/description/url) are duplicated here only
# because jekyll-feed and jekyll-sitemap read them directly from site config.
# Keep them in sync with _data/ui.yml:site.
# =============================================================================

# --- Site identity (consumed by jekyll-feed / jekyll-sitemap) ---
name: Joshua Kim
description: Analytics Engineer
url: http://joshua-data.github.io
baseurl:

# --- Permalinks & pagination ---
permalink: /:title/
paginate: 5
paginate_path: /page:num/

# --- Front-matter defaults — every _posts/*.md auto-receives layout: post ---
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post

# --- Markdown / syntax highlighting ---
kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: 'highlight'

# --- Sass ---
sass:
  style: :expanded

# --- Plugins ---
plugins:
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-paginate

# --- Exclude from build output ---
exclude:
  - LICENSE
  - README.md
  - CLAUDE.md
  - CNAME
  - Gemfile
  - Gemfile.lock
  - .claude
