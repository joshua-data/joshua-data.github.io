# =============================================================================
# Jekyll Configuration
#
# Site identity / nav / social are mirrored from _data/* for convenience
# (Jekyll plugins like jekyll-feed require site.name/description/url).
# To edit content, prefer _data/ files (profile.yml, ui.yml, home.yml, taxonomy.yml).
# =============================================================================

# --- Site identity (required by jekyll-feed/sitemap) ---
name: Joshua Kim
description: Analytics Engineer
url: http://joshua-data.github.io
baseurl:
avatar: /assets/profile/profile-logo.png

# --- Navigation (consumed by _includes/nav.html, _includes/footer.html) ---
navigation:
  - name: Home
    url: /
  - name: Blog
    url: /tags

# --- Footer social handles (consumed by _includes/footer.html) ---
footer-links:
  github: joshua-data
  linkedin: joshuajsk
  rss: /feed.xml

# --- Permalinks & pagination ---
permalink: /:title/
paginate: 5
paginate_path: /page:num/

# --- Front-matter defaults (posts auto-receive layout: post) ---
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post

# --- Markdown / syntax highlighting ---
kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: 'highlight'

# --- Sass ---
sass:
  style: :expanded

# --- Plugins ---
plugins:
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-paginate

# --- Exclude from build output ---
exclude:
  - LICENSE
  - README.md
  - CNAME
  - Gemfile
  - Gemfile.lock
  - .context
  - .claude
