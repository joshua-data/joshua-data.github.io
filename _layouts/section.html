---
layout: default
---

<article class="{{ page.section_class }}">
  <header class="{{ page.section_class }}__header">
    <h1 class="{{ page.section_class }}__title">{{ page.title }}</h1>
    <p class="{{ page.section_class }}__subtitle">{{ page.subtitle }}</p>
  </header>

  <div class="{{ page.section_class }}__content">
    {{ content }}
  </div>
</article>
